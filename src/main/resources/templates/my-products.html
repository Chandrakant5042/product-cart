<!DOCTYPE html>
<html>

<head>

	<title>My Products</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<style>
		* {
			box-sizing: border-box;
		}

		body {
			font-family: Arial, Helvetica, sans-serif;
			background: linear-gradient(135deg, #4e73df, #1cc88a);
			padding: 40px;
			margin: 0;
		}

		.container {
			background: white;
			padding: 30px;
			border-radius: 10px;
			max-width: 800px;
			margin: auto;
			box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
		}

		table {
			width: 100%;
			border-collapse: collapse;
			margin-top: 15px;
		}

		th,
		td {
			padding: 12px;
			border-bottom: 1px solid #ddd;
			text-align: center;
		}

		thead {
			background: #4e73df;
			color: white;
		}

		.btn-back {
			background: #858796;
			color: white;
			border: none;
			padding: 8px 14px;
			border-radius: 5px;
			cursor: pointer;
			margin-bottom: 10px;
		}

		.btn-back:hover {
			background: #6c757d;
		}

		.empty {
			text-align: center;
			padding: 20px;
			color: #666;
		}

		.error {
			text-align: center;
			padding: 20px;
			color: red;
		}
	</style>

</head>

<body>

	<div class="container">

		<h2>My Purchased Products</h2>

		<br>

		<button class="btn-back" onclick="goProducts()">Back to Products</button>

		<table>

			<thead>
				<tr>
					<th>ID</th>
					<th>Product</th>
					<th>Quantity</th>
					<th>Purchased Time</th>
				</tr>
			</thead>

			<tbody id="purchaseTable"></tbody>

		</table>

	</div>

	<script>

		async function loadPurchases() {

			const table = document.getElementById("purchaseTable");

			try {

				const response = await fetch("/api/v1/purchases/my-products", {
					credentials: "include"
				});

				if (response.status === 401 || response.status === 403) {
					window.location.href = "/login-page";
					return;
				}

				if (!response.ok) {
					throw new Error("Server error");
				}

				let data = [];

				try {
					data = await response.json();
				} catch {
					throw new Error("Invalid server response");
				}

				let rows = "";

				if (!Array.isArray(data) || data.length === 0) {

					rows = `<tr><td colspan="4" class="empty">No purchases found</td></tr>`;

				} else {

					data.forEach(p => {

						const id = p.id ?? "";
						const name = p.product?.productName ?? "N/A";
						const qty = p.quantity ?? 0;
						const time = p.purchasedAt
							? new Date(p.purchasedAt).toLocaleDateString("en-IN", {
								day: "2-digit",
								month: "short",
								year: "numeric"
							})
							: "N/A";

						rows += `
<tr>
<td>${id}</td>
<td>${name}</td>
<td>${qty}</td>
<td>${time}</td>
</tr>
`;

					});

				}

				table.innerHTML = rows;

			} catch (error) {

				console.error(error);

				table.innerHTML =
					`<tr><td colspan="4" class="error">Failed to load purchases</td></tr>`;

			}

		}

		function goProducts() {
			window.location.href = "/products-page";
		}

		document.addEventListener("DOMContentLoaded", loadPurchases);

	</script>

</body>

</html>
