<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Signup</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            margin-top: 5px;
        }

        .signup-btn {
            background-color: #4e73df;
            color: white;
        }

        .signup-btn:hover {
            background-color: #2e59d9;
        }

        .login-btn {
            background-color: #858796;
            color: white;
        }

        .login-btn:hover {
            background-color: #6c757d;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }

        .success {
            color: green;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Create Account</h2>

    <div id="message"></div>

    <form id="signupForm">
        <input 
            type="text" 
            id="username" 
            placeholder="Username"
            autocomplete="username"
            required
        />

        <input 
            type="password" 
            id="password"
            placeholder="Password"
            autocomplete="new-password"
            required
        />

        <select id="role" required>
            <option value="USER">USER</option>
            <option value="ADMIN">ADMIN</option>
        </select>

        <button type="submit" class="signup-btn">Signup</button>

        <button type="button" class="login-btn" onclick="goToLogin()">
            Already have an account? Login
        </button>
    </form>
</div>

<script>
const form = document.getElementById("signupForm");
const messageDiv = document.getElementById("message");

form.addEventListener("submit", async function(e) {
    e.preventDefault();
    messageDiv.innerHTML = "";

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const role = document.getElementById("role").value;

    if (!username || !password) {
        messageDiv.innerHTML = "<div class='error'>Username and password are required</div>";
        return;
    }

    try {
        const response = await fetch("/api/v1/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password,
                role: role
            })
        });

        if (response.ok) {
            messageDiv.innerHTML = "<div class='success'>Signup successful! Redirecting to login...</div>";
            setTimeout(() => window.location.href = "/login-page", 1500);
        } else {
            const text = await response.text();
            messageDiv.innerHTML = "<div class='error'>" + (text || "Signup failed") + "</div>";
        }
    } catch (err) {
        messageDiv.innerHTML = "<div class='error'>Server error. Please try again.</div>";
    }
});

function goToLogin() {
    window.location.href = "/login-page";
}
</script>

</body>
</html>
