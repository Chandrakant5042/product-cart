<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Products</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
		}

		body {
			min-height: 100vh;
			background: linear-gradient(135deg, #4e73df, #1cc88a);
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 20px;
		}

		.container {
			background: white;
			width: 100%;
			max-width: 950px;
			padding: 30px;
			border-radius: 12px;
			box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
		}

		.header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			margin-bottom: 25px;
		}

		h2 {
			color: #333;
			font-weight: 600;
		}

		.btn {
			padding: 8px 14px;
			border: none;
			border-radius: 6px;
			cursor: pointer;
			font-size: 14px;
			transition: 0.3s;
		}

		.btn-create {
			background: #1cc88a;
			color: white;
			margin-right: 8px;
		}

		.btn-create:hover {
			background: #17a673;
		}

		.btn-logout {
			background: #e74a3b;
			color: white;
		}

		.btn-logout:hover {
			background: #c0392b;
		}

		table {
			width: 100%;
			border-collapse: collapse;
			margin-top: 10px;
		}

		thead {
			background: #4e73df;
			color: white;
		}

		th,
		td {
			padding: 12px;
			text-align: center;
		}

		tbody tr:nth-child(even) {
			background: #f8f9fc;
		}

		tbody tr:hover {
			background: #e2e6f5;
		}

		.btn-edit {
			background: #f6c23e;
			color: white;
			padding: 6px 10px;
			font-size: 13px;
			border-radius: 5px;
			border: none;
			cursor: pointer;
		}

		.btn-delete {
			background: #e74a3b;
			color: white;
			padding: 6px 10px;
			font-size: 13px;
			border-radius: 5px;
			border: none;
			cursor: pointer;
		}

		.btn-buy {
			background: #1cc88a;
			color: white;
			padding: 6px 10px;
			font-size: 13px;
			border-radius: 5px;
			border: none;
			cursor: pointer;
		}

		.empty-message {
			text-align: center;
			padding: 20px;
			color: #666;
		}

		#pagination {
			margin-top: 20px;
			text-align: center;
		}

		.page-btn {
			background: #4e73df;
			color: white;
			border: none;
			padding: 7px 14px;
			margin: 0 5px;
			border-radius: 5px;
			cursor: pointer;
		}

		.page-btn:disabled {
			background: #cdd4f6;
			cursor: not-allowed;
		}

		.page-info {
			margin: 0 10px;
			font-weight: 500;
		}

		@media(max-width:600px) {

			th,
			td {
				font-size: 12px;
				padding: 8px;
			}

			.btn {
				font-size: 12px;
				padding: 6px 10px;
			}
		}
	</style>
</head>

<body>

	<div class="container">

		<div class="header">

			<h2>Product List</h2>

			<div>
				<button class="btn" onclick="goProfile()">Profile</button>

				<button class="btn" onclick="window.location.href='/my-products-page'">
					My Purchases
				</button>

				<button id="createBtn" class="btn btn-create" onclick="window.location.href='/create-product-page'"
					style="display:none">
					+ Create Product
				</button>

				<button class="btn btn-logout" onclick="logout()">Logout</button>
			</div>

		</div>

		<table>

			<thead>
				<tr>
					<th>ID</th>
					<th>Product Name</th>
					<th>Quantity</th>
					<th>Actions</th>
				</tr>
			</thead>

			<tbody id="productTable"></tbody>

		</table>

		<div id="pagination"></div>

	</div>

	<script>

		function goProfile() {
			window.location.href = "/profile-page";
		}

		let currentPage = 0;
		let currentUserRole = "";

		/* ---------- LOAD USER ---------- */

		async function loadCurrentUser() {

			try {

				const response = await fetch("/api/v1/profile", {credentials: "include"});

				if (!response.ok) {
					window.location.href = "/login-page";
					return;
				}

				const user = await response.json();

				if (user.role === "ROLE_ADMIN") {
					currentUserRole = "ADMIN";
					document.getElementById("createBtn").style.display = "inline-block";
				} else {
					currentUserRole = "USER";
				}

			} catch (e) {
				window.location.href = "/login-page";
			}

		}

		/* ---------- LOAD PRODUCTS ---------- */

		async function loadProducts(page = 0) {

			if (page < 0) page = 0;

			currentPage = page;

			try {

				const response = await fetch(`/api/v1/products?page=${page}`, {
					credentials: "include"
				});

				if (response.status === 401 || response.status === 403) {
					window.location.href = "/login-page";
					return;
				}

				if (!response.ok) {
					throw new Error();
				}

				const data = await response.json();

				let table = "";

				if (!data.content || data.content.length === 0) {

					table = `<tr><td colspan="4" class="empty-message">No products found</td></tr>`;

				} else {

					data.content.forEach(p => {

						const id = p.id ?? "";
						const name = p.productName ?? "N/A";
						const qty = p.quantity ?? 0;

						let actions = "";

						if (currentUserRole === "ADMIN") {
							actions = `
<button class="btn-edit" onclick="edit(${id})">Edit</button>
<button class="btn-delete" onclick="deleteProduct(${id})">Delete</button>
`;
						}

						if (currentUserRole === "USER") {
							actions = `
<button class="btn-buy" onclick="buyProduct(${id})">Buy</button>
`;
						}

						table += `
<tr>
<td>${id}</td>
<td>${name}</td>
<td>${qty}</td>
<td>${actions}</td>
</tr>
`;

					});

				}

				document.getElementById("productTable").innerHTML = table;

				const pageNumber = data.page ?? 0;
				const totalPages = data.totalPages ?? 1;

				document.getElementById("pagination").innerHTML = `

<button class="page-btn"
onclick="loadProducts(${pageNumber - 1})"
${pageNumber === 0 ? 'disabled' : ''}>
Previous
</button>

<span class="page-info">
Page ${pageNumber + 1} of ${totalPages}
</span>

<button class="page-btn"
onclick="loadProducts(${pageNumber + 1})"
${pageNumber + 1 >= totalPages ? 'disabled' : ''}>
Next
</button>
`;

			} catch (e) {

				document.getElementById("productTable").innerHTML =
					`<tr><td colspan="4" class="empty-message">Error loading products</td></tr>`;

			}

		}

		/* ---------- PAGE INIT ---------- */

		(async function () {

			await loadCurrentUser();
			loadProducts();

		})();

		/* ---------- EDIT ---------- */

		function edit(id) {
			window.location.href = "/edit-product-page?id=" + id;
		}

		/* ---------- DELETE ---------- */

		async function deleteProduct(id) {

			if (!confirm("Delete this product?")) return;

			try {

				const response = await fetch(`/api/v1/products/${id}`, {
					method: "DELETE",
					credentials: "include"
				});

				if (response.status === 401) {
					window.location.href = "/login-page";
					return;
				}

				if (!response.ok) {
					throw new Error();
				}

				alert("Product deleted");
				loadProducts(currentPage);

			} catch (e) {
				alert("Delete failed");
			}

		}

		/* ---------- BUY ---------- */

		async function buyProduct(productId) {

			if (!confirm("Do you want to buy this product?")) return;

			try {

				const response = await fetch(`/api/v1/purchases/${productId}`, {
					method: "POST",
					credentials: "include"
				});

				if (response.status === 401 || response.status === 403) {
					window.location.href = "/login-page";
					return;
				}

				if (!response.ok) {
					throw new Error();
				}

				alert("Product purchased successfully");

			} catch (e) {
				alert("Purchase failed");
			}

		}

		/* ---------- LOGOUT ---------- */

		async function logout() {

			try {
				await fetch("/api/v1/logout", {
					method: "POST",
					credentials: "include"
				});
			} catch (e) { }

			window.location.href = "/login-page";

		}

	</script>

</body>

</html>
