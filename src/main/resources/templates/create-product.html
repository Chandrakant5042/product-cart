<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

	<title>Create Product</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: Arial, sans-serif;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			background: linear-gradient(135deg, #4e73df, #1cc88a);
		}

		.card {
			background: white;
			padding: 40px;
			border-radius: 12px;
			box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
			width: 350px;
		}

		h2 {
			text-align: center;
			margin-bottom: 25px;
		}

		input {
			width: 100%;
			padding: 10px;
			margin-bottom: 15px;
			border-radius: 6px;
			border: 1px solid #ccc;
			font-size: 14px;
		}

		button {
			width: 100%;
			padding: 10px;
			border-radius: 6px;
			border: none;
			cursor: pointer;
			font-size: 14px;
			margin-top: 5px;
		}

		.save-btn {
			background: #4e73df;
			color: white;
		}

		.save-btn:hover {
			background: #2e59d9;
		}

		.back-btn {
			background: #858796;
			color: white;
		}

		.back-btn:hover {
			background: #6c757d;
		}

		.error {
			color: red;
			text-align: center;
			margin-bottom: 10px;
		}

		.success {
			color: green;
			text-align: center;
			margin-bottom: 10px;
		}
	</style>
</head>

<body>

	<div class="card">

		<h2>Create Product</h2>

		<div id="message"></div>

		<form id="createForm">

			<input type="text" id="productName" placeholder="Product Name" required />

			<input type="number" id="quantity" placeholder="Quantity" min="0" required />

			<button type="submit" class="save-btn">Save Product</button>

			<button type="button" class="back-btn" onclick="goBack()">
				Back to Products
			</button>

		</form>

	</div>

	<script>

		document.getElementById("createForm")
			.addEventListener("submit", async function (e) {

				e.preventDefault();

				const messageDiv = document.getElementById("message");
				messageDiv.innerHTML = "";

				const productName =
					document.getElementById("productName").value.trim();

				const quantityValue =
					document.getElementById("quantity").value;

				const quantity = parseInt(quantityValue);

				if (!productName) {
					messageDiv.innerHTML =
						"<div class='error'>Product name is required</div>";
					return;
				}

				if (isNaN(quantity) || quantity < 0) {
					messageDiv.innerHTML =
						"<div class='error'>Quantity must be 0 or greater</div>";
					return;
				}

				try {

					const response = await fetch("/api/v1/products", {
						method: "POST",
						credentials: "include",
						headers: {
							"Content-Type": "application/json"
						},
						body: JSON.stringify({
							productName: productName,
							quantity: quantity
						})
					});

					if (response.status === 401) {

						messageDiv.innerHTML =
							"<div class='error'>Session expired. Please login again.</div>";

						setTimeout(() => {
							window.location.href = "/login-page";
						}, 1500);

						return;
					}

					if (response.status === 403) {
						messageDiv.innerHTML =
							"<div class='error'>You are not allowed to create a product.</div>";
						return;
					}

					if (!response.ok) {

						const text = await response.text();
						throw new Error(text || "Creation failed");

					}

					messageDiv.innerHTML =
						"<div class='success'>Product created successfully!</div>";

					setTimeout(() => {
						window.location.href = "/products-page";
					}, 1000);

				} catch (error) {

					console.error("Create product error:", error);

					messageDiv.innerHTML =
						"<div class='error'>Failed to create product</div>";

				}

			});

		function goBack() {
			window.location.href = "/products-page";
		}

	</script>

</body>

</html>
