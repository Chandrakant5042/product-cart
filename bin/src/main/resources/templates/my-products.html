<!DOCTYPE html>
<html>
<head>
<title>My Products</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#4e73df,#1cc88a);
    padding:40px;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    max-width:800px;
    margin:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

thead{
    background:#4e73df;
    color:white;
}

.btn-back{
    background:#858796;
    color:white;
    border:none;
    padding:8px 14px;
    border-radius:5px;
    cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>My Purchased Products</h2>

<br>

<button class="btn-back" onclick="goProducts()">Back to Products</button>

<table>

<thead>
<tr>
<th>ID</th>
<th>Product</th>
<th>Quantity</th>
<th>Purchased Time</th>
</tr>
</thead>

<tbody id="purchaseTable"></tbody>

</table>

</div>

<script>

async function loadPurchases(){

    try{

        const response = await fetch("/api/v1/purchases/my-products",{
            credentials:"include"
        });

        if(response.status === 401 || response.status === 403){
            window.location.href="/login-page";
            return;
        }

        const data = await response.json();

        let rows = "";

        if(data.length === 0){
            rows = `<tr><td colspan="4">No purchases found</td></tr>`;
        }
        else{

            data.forEach(p=>{

                rows += `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.product.productName}</td>
                    <td>${p.quantity}</td>
                    <td>${p.purchasedAt}</td>
                </tr>
                `;

            });

        }

        document.getElementById("purchaseTable").innerHTML = rows;

    }
    catch(error){
        alert("Failed to load purchases");
    }

}

loadPurchases();

function goProducts(){
    window.location.href="/products-page";
}

</script>

</body>
</html>
